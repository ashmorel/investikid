<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgC" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38bdf8"/><stop offset="0.55" stop-color="#2563eb"/><stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="goldC" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#fde68a"/><stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="sheenC" cx="0.3" cy="0.2" r="0.9">
      <stop stop-color="#ffffff" stop-opacity="0.18"/><stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" rx="230" fill="url(#bgC)"/>
  <rect width="1024" height="1024" rx="230" fill="url(#sheenC)"/>

  <!-- coin stack (3 coins) -->
  <g stroke="#b45309" stroke-width="11">
    <ellipse cx="512" cy="812" rx="206" ry="62" fill="url(#goldC)"/>
    <ellipse cx="512" cy="724" rx="206" ry="62" fill="url(#goldC)"/>
    <ellipse cx="512" cy="636" rx="206" ry="62" fill="url(#goldC)"/>
  </g>
  <ellipse cx="512" cy="636" rx="168" ry="44" fill="none" stroke="#b45309" stroke-width="7" stroke-opacity="0.4"/>
  <text x="512" y="666" text-anchor="middle" font-family="Nunito, Arial, sans-serif" font-size="92" font-weight="800" fill="#b45309" fill-opacity="0.85">£</text>

  <!-- Penny (white piggy face) sitting on top of the stack -->
  <g transform="translate(512 410)">
    <path d="M-150 -120 q -30 -56 14 -74 q 46 -8 52 56 z" fill="#ffffff"/>
    <path d="M150 -120 q 30 -56 -14 -74 q -46 -8 -52 56 z" fill="#ffffff"/>
    <path d="M-142 -118 q -18 -38 8 -50 q 28 -4 32 36 z" fill="#fbcfe8"/>
    <path d="M142 -118 q 18 -38 -8 -50 q -28 -4 -32 36 z" fill="#fbcfe8"/>
    <circle r="166" fill="#ffffff"/>
    <circle cx="-62" cy="-28" r="21" fill="#0c4a6e"/>
    <circle cx="62" cy="-28" r="21" fill="#0c4a6e"/>
    <circle cx="-54" cy="-36" r="7" fill="#ffffff"/>
    <circle cx="70" cy="-36" r="7" fill="#ffffff"/>
    <circle cx="-120" cy="40" r="21" fill="#fbcfe8" fill-opacity="0.85"/>
    <circle cx="120" cy="40" r="21" fill="#fbcfe8" fill-opacity="0.85"/>
    <ellipse cx="0" cy="62" rx="78" ry="52" fill="#fbcfe8"/>
    <ellipse cx="-28" cy="62" rx="12" ry="18" fill="#be185d" fill-opacity="0.55"/>
    <ellipse cx="28" cy="62" rx="12" ry="18" fill="#be185d" fill-opacity="0.55"/>
    <path d="M-60 128 Q0 176 60 128" stroke="#0ea5e9" stroke-width="13" fill="none" stroke-linecap="round"/>
  </g>
</svg>
