name: Concept taxonomy backfill (one-off)
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BACKEND_URL: ${{ vars.BACKEND_URL || 'https://investikid.up.railway.app' }}
    steps:
      - name: Trigger concept backfill
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -uo pipefail
          if [ -z "${CRON_SECRET:-}" ]; then
            echo "::error::CRON_SECRET is empty (add it under Actions → Secrets)."; exit 1
          fi
          curl -sS --fail -X POST --retry 4 --retry-delay 5 \
            --connect-timeout 15 --max-time 120 \
            -H "X-Cron-Secret: $CRON_SECRET" \
            "$BACKEND_URL/internal/concepts/backfill"
