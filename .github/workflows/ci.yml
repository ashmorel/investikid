name: CI

on:
  push:
    branches: [main, staging, testing]
    paths:
      - ".github/workflows/**"
      - "backend/**"
      - "frontend/**"
      - "!docs/**"
  pull_request:
    branches: [main, staging]
    paths:
      - ".github/workflows/**"
      - "backend/**"
      - "frontend/**"
      - "!docs/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - id: filter
        name: Classify changed files
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            base="origin/${{ github.base_ref }}"
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            base="${{ github.event.before }}"
          else
            base="$(git rev-list --max-parents=0 HEAD)"
          fi

          changed="$(git diff --name-only "$base" HEAD)"
          printf '%s\n' "$changed"

          if printf '%s\n' "$changed" | grep -Eq '^frontend/'; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi

          if printf '%s\n' "$changed" | grep -Eq '^backend/'; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
          fi

          if printf '%s\n' "$changed" | grep -Eq '^\.github/workflows/'; then
            echo "ci=true" >> "$GITHUB_OUTPUT"
          else
            echo "ci=false" >> "$GITHUB_OUTPUT"
          fi

  frontend:
    name: Frontend (lint · typecheck · test · build)
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || github.ref == 'refs/heads/staging' && 'staging' || 'testing' }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  backend:
    name: Backend (lint · test)
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || github.ref == 'refs/heads/staging' && 'staging' || 'testing' }}
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: investedb_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d investedb_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/investedb_test
      TEST_DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/investedb_test
      JWT_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - run: pip install -r requirements.txt

      - name: Lint
        run: ruff check .

      - name: Tests
        run: python -m pytest -v

  security:
    name: Security (bandit · pip-audit · npm audit)
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || github.ref == 'refs/heads/staging' && 'staging' || 'testing' }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps + security tools
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Bandit (fail on High severity + High confidence)
        working-directory: backend
        run: bandit -r app -lll -iii

      - name: pip-audit (fail on any known vuln)
        working-directory: backend
        # PYSEC-2026-161 (starlette): fix is starlette 1.0.1, but FastAPI 0.121
        # caps starlette at <0.50.0. Accepted + tracked; resolve via a FastAPI
        # major upgrade post-beta. Framework-transitive, not first-party code.
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2026-161

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm install
        working-directory: frontend
        run: npm ci

      - name: npm audit (fail on High+, production deps only)
        working-directory: frontend
        # --omit=dev: the deploy gate blocks only on vulnerabilities in
        # dependencies that actually ship to production. Dev/test tooling
        # (vitest, playwright, eslint, etc.) is never bundled or deployed, so
        # advisories there (e.g. the vitest UI-server CVE) must not block
        # releases. Track dev-tooling upgrades separately. See security register.
        run: npm audit --omit=dev --audit-level=high

  a11y:
    name: A11y (playwright-axe e2e)
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || github.ref == 'refs/heads/staging' && 'staging' || 'testing' }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --legacy-peer-deps

      # jsx-a11y lint + vitest-axe unit tests already run in the Frontend job
      # (identical `npm run lint` + `npm test`, and both jobs always run
      # together), so this job only adds the browser-based axe scan.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}

      # playwright.config uses chromium (Desktop Chrome) + webkit (iPhone 13 mobile).
      - name: Install Playwright browser (+ OS deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium webkit

      - name: Install Playwright OS deps (browser restored from cache)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium webkit

      - name: E2E axe scan
        run: npm run test:e2e:a11y

  responsive:
    name: Responsive (viewport tests)
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || github.ref == 'refs/heads/staging' && 'staging' || 'testing' }}
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --legacy-peer-deps

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}

      # playwright.config uses chromium (Desktop Chrome) + webkit (iPhone 13 mobile).
      - name: Install Playwright browser (+ OS deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium webkit

      - name: Install Playwright OS deps (browser restored from cache)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium webkit

      - name: Responsive viewport tests
        run: npm run test:e2e:responsive
