<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#38bdf8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>InvestiKid</title>
    <script>
      // iOS WKWebView can compute the wrong viewport width during the first-
      // launch sequence (splash hide / login keyboard / first SPA navigation),
      // leaving content laid out too wide and clipped on the right. It only
      // self-corrects after the app is backgrounded/foregrounded (a re-layout).
      // Changing the viewport meta's `content` forces WKWebView to recompute the
      // viewport — the same effect. A one-shot nudge fires too early to catch the
      // post-login state, so this is a self-healing watchdog: whenever the
      // document is actually wider than the viewport, re-apply the nudge.
      // NOTE: detection via scrollWidth doesn't work here — `overflow-x:hidden`
      // on html/#root clamps scrollWidth to the client width, so overflow is
      // never measurable from JS. The reliable fix is native (AppDelegate forces
      // a web-view re-layout on activation). This is a belt-and-braces web layer:
      // re-apply the viewport-meta nudge unconditionally through the first-launch
      // window and whenever the app is re-presented.
      (function () {
        var BASE = 'width=device-width, initial-scale=1.0, viewport-fit=cover';
        var ALT = 'width=device-width, initial-scale=1.0001, viewport-fit=cover';
        function nudge() {
          var vp = document.querySelector('meta[name="viewport"]');
          if (!vp) return;
          vp.setAttribute('content', ALT);
          requestAnimationFrame(function () { vp.setAttribute('content', BASE); });
        }
        [0, 200, 500, 1000, 2000, 4000].forEach(function (t) { setTimeout(nudge, t); });
        document.addEventListener('DOMContentLoaded', nudge);
        window.addEventListener('load', nudge);
        window.addEventListener('pageshow', nudge);
        window.addEventListener('orientationchange', nudge);
        window.addEventListener('focusout', function () { setTimeout(nudge, 50); });
        document.addEventListener('visibilitychange', function () {
          if (!document.hidden) nudge();
        });
        if (window.visualViewport) window.visualViewport.addEventListener('resize', nudge);
      })();
    </script>
    <script>
      // Boot watchdog (diagnostic). The app normally mounts into #root within a
      // second. If it hasn't after a grace period, paint the actual cause on
      // screen instead of a blank white view — so startup failures are
      // diagnosable on devices where the JS console isn't reachable (e.g. a
      // TestFlight build). This inline script always runs, even if the bundled
      // entry module is blocked from loading, so it can report that case too.
      (function () {
        var errs = [];
        window.addEventListener('error', function (e) {
          errs.push('error: ' + (e && e.message ? e.message : 'unknown') +
            (e && e.filename ? ' @ ' + e.filename + ':' + e.lineno + ':' + e.colno : ''));
        });
        window.addEventListener('unhandledrejection', function (e) {
          var r = e && e.reason;
          errs.push('unhandledrejection: ' + ((r && (r.stack || r.message)) || String(r)));
        });
        setTimeout(function () {
          var root = document.getElementById('root');
          if (!root || root.childElementCount > 0) return; // mounted fine
          var booted = !!window.__bootStarted;
          var detail = errs.length
            ? errs.join('\n\n')
            : booted
              ? 'The bundle executed but the UI never rendered.'
              : 'The app bundle did not execute (no JavaScript error was raised) — ' +
                'the entry script was blocked from loading.';
          root.innerHTML =
            '<div style="padding:20px;font:13px -apple-system,system-ui,monospace;' +
            'white-space:pre-wrap;word-break:break-word;color:#7f1d1d;">' +
            '<strong style="font-size:15px;">InvestiKid failed to start</strong>\n\n' +
            detail + '\n\nbootStarted: ' + booted +
            '\nplatform: ' +
            (window.Capacitor && window.Capacitor.getPlatform ? window.Capacitor.getPlatform() : 'web') +
            '\nurl: ' + location.href + '</div>';
        }, 6000);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
