<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f59e0b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <title>Invest-Ed</title>
    <script>
      // iOS WKWebView can compute the wrong viewport width during the first-
      // launch sequence (splash hide / login keyboard / first SPA navigation),
      // leaving content laid out too wide and clipped on the right. It only
      // self-corrects after the app is backgrounded/foregrounded (a re-layout).
      // Changing the viewport meta's `content` forces WKWebView to recompute the
      // viewport — the same effect. A one-shot nudge fires too early to catch the
      // post-login state, so this is a self-healing watchdog: whenever the
      // document is actually wider than the viewport, re-apply the nudge.
      // NOTE: detection via scrollWidth doesn't work here — `overflow-x:hidden`
      // on html/#root clamps scrollWidth to the client width, so overflow is
      // never measurable from JS. The reliable fix is native (AppDelegate forces
      // a web-view re-layout on activation). This is a belt-and-braces web layer:
      // re-apply the viewport-meta nudge unconditionally through the first-launch
      // window and whenever the app is re-presented.
      (function () {
        var BASE = 'width=device-width, initial-scale=1.0, viewport-fit=cover';
        var ALT = 'width=device-width, initial-scale=1.0001, viewport-fit=cover';
        function nudge() {
          var vp = document.querySelector('meta[name="viewport"]');
          if (!vp) return;
          vp.setAttribute('content', ALT);
          requestAnimationFrame(function () { vp.setAttribute('content', BASE); });
        }
        [0, 200, 500, 1000, 2000, 4000].forEach(function (t) { setTimeout(nudge, t); });
        document.addEventListener('DOMContentLoaded', nudge);
        window.addEventListener('load', nudge);
        window.addEventListener('pageshow', nudge);
        window.addEventListener('orientationchange', nudge);
        window.addEventListener('focusout', function () { setTimeout(nudge, 50); });
        document.addEventListener('visibilitychange', function () {
          if (!document.hidden) nudge();
        });
        if (window.visualViewport) window.visualViewport.addEventListener('resize', nudge);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
