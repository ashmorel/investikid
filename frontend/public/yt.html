<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- Send a valid https Referer to YouTube. This page is served from the real
         https web origin, which fixes YouTube "error 153" inside the iOS Capacitor
         WKWebView (the app's capacitor:// scheme has its Referer stripped). -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>Lesson video</title>
    <style>
      html, body { margin: 0; height: 100%; background: #000; }
      #player, .frame { position: fixed; inset: 0; width: 100%; height: 100%; border: 0; }
      .msg {
        font-family: -apple-system, system-ui, sans-serif;
        color: #fff; display: flex; align-items: center; justify-content: center;
        height: 100%; padding: 16px; text-align: center; font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div class="msg" id="msg">Video unavailable.</div>
    <div id="player"></div>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var id = (params.get('v') || '').trim();
        // Mirror the app's validation: YouTube ids are [A-Za-z0-9_-].
        if (!/^[A-Za-z0-9_-]+$/.test(id)) return;

        var msg = document.getElementById('msg');
        if (msg) msg.remove();

        // Notify the parent app (the Capacitor WKWebView) of player lifecycle
        // events so it can end into its own UI / fail gracefully instead of
        // showing YouTube's related-video end-screen or a raw error.
        function notify(event, code) {
          try {
            // Target the app origin loosely with '*': the parent validates both
            // the message origin (this page's https origin) and the tagged
            // { type: 'investikid-yt' } shape, so a wildcard target is safe here.
            parent.postMessage({ type: 'investikid-yt', event: event, code: code }, '*');
          } catch (e) {}
        }

        function createPlayer() {
          // The nocookie host keeps cookies off until playback; playsinline/rel/
          // modestbranding mirror the web embed.
          /* eslint-disable no-undef */
          new YT.Player('player', {
            videoId: id,
            host: 'https://www.youtube-nocookie.com',
            playerVars: { playsinline: 1, rel: 0, modestbranding: 1 },
            events: {
              onReady: function () { notify('ready'); },
              onStateChange: function (e) {
                if (e.data === YT.PlayerState.ENDED) notify('ended');
              },
              onError: function (e) { notify('error', e.data); }
            }
          });
          /* eslint-enable no-undef */
        }

        // If the IFrame API can't load (offline / blocked), fail gracefully so the
        // parent shows its friendly fallback rather than a blank frame.
        var failTimer = setTimeout(function () { notify('error'); }, 8000);
        window.onYouTubeIframeAPIReady = function () {
          clearTimeout(failTimer);
          createPlayer();
        };

        // Loading the IFrame API from youtube.com is fine here — this page runs on
        // the real https web origin (not the capacitor:// scheme). It builds the
        // player iframe pointing at https://www.youtube-nocookie.com/embed/<id>.
        var s = document.createElement('script');
        s.src = 'https://www.youtube.com/iframe_api';
        s.onerror = function () { clearTimeout(failTimer); notify('error'); };
        document.head.appendChild(s);
      })();
    </script>
  </body>
</html>
