<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <!-- Send a valid https Referer to YouTube. This page is served from the real
         https web origin, which fixes YouTube "error 153" inside the iOS Capacitor
         WKWebView (the app's capacitor:// scheme has its Referer stripped). -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>Lesson video</title>
    <style>
      html, body { margin: 0; height: 100%; background: #000; }
      .frame { position: fixed; inset: 0; width: 100%; height: 100%; border: 0; }
      .msg {
        font-family: -apple-system, system-ui, sans-serif;
        color: #fff; display: flex; align-items: center; justify-content: center;
        height: 100%; padding: 16px; text-align: center; font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div class="msg" id="msg">Video unavailable.</div>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var id = (params.get('v') || '').trim();
        // Mirror the app's validation: YouTube ids are [A-Za-z0-9_-].
        if (!/^[A-Za-z0-9_-]+$/.test(id)) return;

        var src =
          'https://www.youtube-nocookie.com/embed/' +
          encodeURIComponent(id) +
          '?playsinline=1&rel=0&modestbranding=1';

        var iframe = document.createElement('iframe');
        iframe.className = 'frame';
        iframe.src = src;
        iframe.title = 'Lesson video';
        iframe.setAttribute('allow', 'accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture; web-share');
        iframe.setAttribute('allowfullscreen', '');
        iframe.referrerPolicy = 'strict-origin-when-cross-origin';

        var msg = document.getElementById('msg');
        if (msg) msg.remove();
        document.body.appendChild(iframe);
      })();
    </script>
  </body>
</html>
